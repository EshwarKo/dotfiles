# Claude Code tmux extensions
# Source from main tmux.conf:  source-file ~/dotfiles/tmux/claude-tmux.conf

##### Single-Agent Shortcuts #####

# prefix + C: Claude Code in a vertical split pane
bind C split-window -h 'claude'

# prefix + A: Claude Code in a new window
bind A new-window -n 'claude' 'claude'

# prefix + R: resume last conversation
bind R new-window -n 'claude-resume' 'claude -c'

##### Agent Teams (tmux split-pane mode) #####

# prefix + T: launch agent team (lead + workers in split panes)
#   Claude auto-detects tmux and uses split-pane mode for teammates.
#   Use Shift+Down to cycle between teammates once team is running.
bind T new-window -n 'team' 'claude --teammate-mode tmux'

# prefix + W: team layout: lead (left) | 2 workers (right) | dashboard (bottom)
bind W \
  new-window -n 'team-layout' \; \
  split-window -h -p 55 \; \
  split-window -v -t 1 \; \
  split-window -v -t 0 -p 25 \; \
  send-keys -t 0 'claude --teammate-mode tmux' Enter \; \
  send-keys -t 3 'bash ~/dotfiles/claude/scripts/claude-dashboard.sh' Enter

##### Ralph Loop #####

# prefix + S: start ralph loop from a spec file
bind S command-prompt -p "Spec file path:" \
  "new-window -n 'ralph' 'bash ~/dotfiles/claude/scripts/ralph-loop.sh \"%1\"'"

##### Multi-Session Layouts #####

# prefix + M: 4-pane grid with concurrent Claude sessions
bind M \
  new-window -n 'multi-claude' \; \
  split-window -h \; \
  split-window -v \; \
  select-pane -t 0 \; \
  split-window -v \; \
  send-keys -t 0 'claude' Enter \; \
  send-keys -t 1 'claude' Enter \; \
  send-keys -t 2 'claude' Enter \; \
  send-keys -t 3 'claude' Enter

# prefix + G: worktree-isolated sessions (prompts for branch name)
bind G command-prompt -p "Branch name:" \
  "run-shell 'bash ~/dotfiles/claude/scripts/claude-worktree-session.sh \"%1\"'"

##### Dashboard #####

# prefix + D: agent dashboard
bind D new-window -n 'dashboard' 'bash ~/dotfiles/claude/scripts/claude-dashboard.sh'

##### Capture & Navigation #####

# prefix + Y: capture current pane (last 500 lines)
bind Y run-shell 'tmux capture-pane -p -S -500 > /tmp/tmux-capture.txt && tmux display "Captured to /tmp/tmux-capture.txt"'

# prefix + P: paste last capture
bind P run-shell 'tmux load-buffer /tmp/tmux-capture.txt && tmux paste-buffer'

##### Agent Team Navigation Hints #####
# Shift+Down   = cycle to next teammate
# Shift+Up     = cycle to previous teammate
# Ctrl+T       = toggle task list
# Shift+Tab    = toggle delegate mode (lead coordinates only)
