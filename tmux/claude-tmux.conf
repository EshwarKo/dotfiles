# Claude Code tmux extensions
# Source from main tmux.conf:  source-file ~/dotfiles/tmux/claude-tmux.conf

##### Claude Code Session Management #####

# prefix + C: open Claude Code in a new pane (vertical split)
bind C split-window -h 'claude'

# prefix + A: open Claude Code in a new window
bind A new-window -n 'claude' 'claude'

# prefix + R: resume last Claude conversation in a new window
bind R new-window -n 'claude-resume' 'claude -c'

# prefix + D: open the agent dashboard
bind D new-window -n 'dashboard' 'bash ~/dotfiles/claude/scripts/claude-dashboard.sh'

##### Multi-Agent Layout #####

# prefix + M: create a 3-pane Claude workspace
# Left: editor | Top-right: agent-1 | Bottom-right: agent-2
bind M \
  new-window -n 'multi-agent' \; \
  split-window -h \; \
  split-window -v \; \
  select-pane -t 0

##### Session Naming #####

# When creating new sessions for Claude work, use descriptive names:
#   tmux new-session -s feature-auth
#   tmux new-session -s bugfix-123
#   tmux new-session -s research

##### Capture & Send Helpers #####

# prefix + Y: capture current pane output to a temp file
bind Y capture-pane -p -S -100 \; save-buffer /tmp/tmux-capture.txt \; display "Captured to /tmp/tmux-capture.txt"
